<!DOCTYPE html>
<html lang="fr">
<head>

  <title>{{ page.title }} — {{ site.sujets_section_title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">
</head>
<body>

    <div class="breadcrumb"><a href="{{ '/' | relative_url }}">← {{ site.title }}</a></div>
    <div class="header-row">
      <a class="site-title" href="{{ '/index-sujets-hlp/' | relative_url }}">{{ site.sujets_section_title }}</a>
      <nav>
        <a href="{{ '/index-sujets-hlp/' | relative_url }}">Accueil</a>
        <a href="{{ '/index-sujets-hlp/sujets/' | relative_url }}">Rechercher</a>
      </nav>
    </div>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    <p>{{ site.data.sujets | size }} sujets indexés · généré avec Jekyll</p>
  </footer>
</body>
</html>
